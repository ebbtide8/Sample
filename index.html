<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radiko PWA Player - Step 3</title>
    <!-- M4AやMP3のタグを解析するライブラリを読み込み -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .player-card {
            background-color: #2d2d2d;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            width: 450px;
            text-align: center;
            position: relative; /* 歌詞オーバーレイの基準位置 */
            overflow: hidden;   /* 歌詞がカードからはみ出さないように */
        }
        .file-input-label {
            display: inline-block;
            background-color: #1f6aa5;
            color: white;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            margin-bottom: 20px;
            font-size: 14px;
        }
        .file-input-label:hover {
            background-color: #144d77;
        }
        input[type="file"] {
            display: none;
        }
        
        /* メタデータ表示エリア（縦積みレイアウト） */
        .meta-container {
            display: flex;
            flex-direction: column; /* 縦積みに変更 */
            background-color: #202020;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: left;
        }
        
        /* 横長（左右いっぱい）のアートワーク */
        .cover-art {
            width: 100%;
            height: 200px; /* 横長に適した高さ */
            background-color: #3a3a3a;
            border-radius: 6px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 14px;
            color: #888;
            margin-bottom: 15px; /* 下部テキストとの間隔 */
            background-size: contain; /* 横長画像が潰れないように収める */
            background-position: center;
            background-repeat: no-repeat;
            cursor: pointer; /* クリック可能であることを示す */
            transition: opacity 0.2s;
        }
        .cover-art:hover {
            opacity: 0.8;
        }
        
        .track-info {
            width: 100%;
            overflow: hidden;
        }
        .track-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .track-album, .track-artist {
            font-size: 14px;
            color: #aaa;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        /* 歌詞オーバーレイ表示エリア */
        .lyrics-overlay {
            position: absolute;
            bottom: -100%; /* 初期状態は画面外（下部） */
            left: 0;
            width: 100%;
            height: 80%; /* プレイヤーカードの8割を覆う */
            background-color: rgba(40, 40, 40, 0.95);
            box-sizing: border-box;
            padding: 25px;
            border-top: 2px solid #1f6aa5;
            transition: bottom 0.3s ease-in-out; /* スッとせり上がるアニメーション */
            text-align: left;
            display: flex;
            flex-direction: column;
            z-index: 10;
        }
        .lyrics-overlay.active {
            bottom: 0; /* アクティブ時にせり上がる */
        }
        .lyrics-header {
            font-size: 14px;
            font-weight: bold;
            color: #1f6aa5;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            cursor: pointer;
        }
        .lyrics-content {
            flex-grow: 1;
            overflow-y: auto; /* 縦スクロール（オーバーフロー）を許可 */
            font-size: 15px;
            line-height: 1.6;
            white-space: pre-wrap; /* 改行をそのまま反映 */
            color: #eee;
            padding-right: 5px;
        }
        
        /* レジューム通知 */
        .resume-status {
            font-size: 12px;
            color: #2ecc71;
            margin-bottom: 10px;
            height: 18px;
        }
        
        audio {
            width: 100%;
        }
    </style>
</head>
<body>

<div class="player-card">
    <h2>Radiko PWA 試作版</h2>
    
    <label class="file-input-label">
        ▼ 音声ファイルを選択
        <input type="file" id="audio-file" accept="audio/*">
    </label>
    
    <!-- メタデータ・カバーアート表示領域 -->
    <div class="meta-container">
        <!-- クリックで歌詞が開く旨を伝えるヒントを付与 -->
        <div class="cover-art" id="cover-art" title="クリックで歌詞を表示">[No Cover]</div>
        <div class="track-info">
            <div class="track-title" id="track-title">-</div>
            <div class="track-album" id="track-album">-</div>
            <div class="track-artist" id="track-artist">-</div>
        </div>
    </div>
    
    <!-- レジューム状態の通知メッセージ -->
    <div class="resume-status" id="resume-status"></div>
    
    <audio id="audio-player" controls></audio>

    <!-- 歌詞オーバーレイ構造 -->
    <div class="lyrics-overlay" id="lyrics-overlay">
        <div class="lyrics-header" id="lyrics-close">
            <span>【歌詞表示】</span>
            <span>閉じる ✕</span>
        </div>
        <div class="lyrics-content" id="lyrics-content">歌詞情報がありません。</div>
    </div>
</div>

<script>
    const fileInput = document.getElementById('audio-file');
    const audioPlayer = document.getElementById('audio-player');
    
    // UI要素
    const trackTitle = document.getElementById('track-title');
    const trackAlbum = document.getElementById('track-album');
    const trackArtist = document.getElementById('track-artist');
    const coverArt = document.getElementById('cover-art');
    const resumeStatus = document.getElementById('resume-status');
    
    // 歌詞用UI要素
    const lyricsOverlay = document.getElementById('lyrics-overlay');
    const lyricsContent = document.getElementById('lyrics-content');
    const lyricsClose = document.getElementById('lyrics-close');

    let currentFileName = "";
    let loadedLyrics = "";

    // ファイル選択時の処理
    fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        currentFileName = file.name;
        resumeStatus.textContent = ""; 
        loadedLyrics = ""; // 歌詞の初期化
        lyricsOverlay.classList.remove('active'); // 新しいファイル時は歌詞を閉じる

        // 1. タグ情報の読み込み (jsmediatagsを使用)
        jsmediatags.read(file, {
            onSuccess: function(tag) {
                const tags = tag.tags;
                trackTitle.textContent = tags.title || file.name;
                trackAlbum.textContent = tags.album || "-";
                trackArtist.textContent = tags.artist || "-";

                // 歌詞タグの取得（M4Aの通常の歌詞タグに対応）
                if (tags.lyrics) {
                    loadedLyrics = tags.lyrics;
                } else if (tags.unsynchronisedLyrics) {
                    // MP3などの非同期歌詞タグのフォールバック
                    loadedLyrics = tags.unsynchronisedLyrics.text;
                }
                
                // 歌詞表示エリアへの反映
                lyricsContent.textContent = loadedLyrics ? loadedLyrics : "歌詞情報が含まれていないか、読み込めませんでした。";

                // カバーアートの処理
                if (tags.picture) {
                    const { data, format } = tags.picture;
                    let base64String = "";
                    for (let i = 0; i < data.length; i++) {
                        base64String += String.fromCharCode(data[i]);
                    }
                    coverArt.style.backgroundImage = `url(data:${format};base64,${btoa(base64String)})`;
                    coverArt.textContent = "";
                } else {
                    coverArt.style.backgroundImage = "none";
                    coverArt.textContent = "[No Cover] (クリックで歌詞)";
                }
            },
            onError: function(error) {
                console.log('タグの読み込みに失敗しました:', error.type, error.info);
                trackTitle.textContent = file.name;
                trackAlbum.textContent = "-";
                trackArtist.textContent = "-";
                coverArt.style.backgroundImage = "none";
                coverArt.textContent = "[No Cover]";
                lyricsContent.textContent = "タグの読み込みエラーのため、歌詞を表示できません。";
            }
        });

        // 2. 再生ソースの設定
        const fileURL = URL.createObjectURL(file);
        audioPlayer.src = fileURL;

        // 3. レジューム（前回の停止位置）の復元
        const savedTime = localStorage.getItem(`resume_${currentFileName}`);
        if (savedTime) {
            const parseFloatTime = parseFloat(savedTime);
            audioPlayer.currentTime = parseFloatTime;
            
            const minutes = Math.floor(parseFloatTime / 60);
            const seconds = Math.floor(parseFloatTime % 60);
            resumeStatus.textContent = `前回の停止位置（${minutes}分${seconds}秒）から再開しました`;
        }

        audioPlayer.play().catch(err => {
            console.log("自動再生がブロックされました。", err);
        });
    });

    // 4. アートワーククリックで歌詞のトグル表示
    coverArt.addEventListener('click', function() {
        if (currentFileName) {
            lyricsOverlay.classList.toggle('active');
        }
    });

    // 歌詞ヘッダー（閉じるボタン）クリックで閉じる
    lyricsClose.addEventListener('click', function() {
        lyricsOverlay.classList.remove('active');
    });

    // 再生位置の自動記録
    audioPlayer.addEventListener('timeupdate', function() {
        if (currentFileName && audioPlayer.currentTime > 0) {
            localStorage.setItem(`resume_${currentFileName}`, audioPlayer.currentTime);
        }
    });

    // 再生完了時の処理
    audioPlayer.addEventListener('ended', function() {
        if (currentFileName) {
            localStorage.removeItem(`resume_${currentFileName}`);
            resumeStatus.textContent = "再生が完了しました";
        }
    });
</script>

</body>
</html>
